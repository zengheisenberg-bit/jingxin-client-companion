<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>境心客户陪伴系统</title>
  <style>
    :root {
      --sun-yellow: #F5C842;
      --lemon: #FAE07A;
      --cream: #FEFAE6;
      --warm-wheat: #C8924A;
      --deep-ink: #2C2720;
      --deep-sun: #E8B420;
      --pale-cream: #FDF5D0;
      --paper-beige: #E8DCC8;
      --umber: #5C4A28;
      --white-paper: #FFFDF2;
      --soft-line: rgba(92, 74, 40, 0.18);
      --shadow-soft: 0 28px 70px rgba(92, 74, 40, 0.09);
      --shadow-tight: 0 10px 30px rgba(92, 74, 40, 0.10);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --font-title: "Hannotate SC", "Kaiti SC", "STKaiti", "Songti SC", "PingFang SC", serif;
      --font-ui: "PingFang SC", "Yuanti SC", "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--deep-ink);
      font-family: var(--font-ui);
      font-size: 14px;
      background:
        radial-gradient(circle at 18% 8%, rgba(250, 224, 122, 0.45), transparent 28%),
        radial-gradient(circle at 82% 2%, rgba(245, 200, 66, 0.24), transparent 22%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.72) 0 25%, transparent 25% 50%, rgba(232, 220, 200, 0.18) 50% 75%, transparent 75%),
        var(--cream);
      background-size: auto, auto, 18px 18px, auto;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      width: min(1380px, calc(100% - 44px));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 8px 0 18px;
    }

    .brand h1 {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(34px, 4.1vw, 58px);
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0;
      color: #2F281C;
      text-shadow: 0 1px 0 rgba(255, 253, 242, 0.8);
    }

    .brand p {
      margin: 10px 0 0;
      max-width: 560px;
      color: var(--umber);
      font-size: 14px;
      line-height: 1.65;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 610px;
      padding: 9px;
      border: 1px solid rgba(92, 74, 40, 0.12);
      border-radius: 28px;
      background: rgba(255, 253, 242, 0.58);
      box-shadow: 0 14px 38px rgba(92, 74, 40, 0.06);
    }

    .field-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 8px 14px;
      border: 1px solid var(--soft-line);
      border-radius: 999px;
      background: rgba(255, 253, 242, 0.72);
      backdrop-filter: blur(8px);
      color: var(--umber);
      font-size: 12px;
    }

    .field-inline select {
      min-width: 108px;
      border: 0;
      background: transparent;
      outline: 0;
      color: var(--deep-ink);
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 9px 14px;
      background: rgba(255, 253, 242, 0.76);
      color: var(--deep-ink);
      line-height: 1;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-tight);
    }

    .btn.primary {
      background: var(--sun-yellow);
      border-color: var(--deep-sun);
      color: var(--deep-ink);
      font-weight: 600;
    }

    .btn.ghost {
      border-color: var(--soft-line);
    }

    .btn.text {
      padding: 8px 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      color: var(--warm-wheat);
    }

    .file-input {
      display: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 315px);
      gap: clamp(16px, 2.4vw, 34px);
      align-items: center;
      padding: 18px 22px;
      border: 1px solid rgba(92, 74, 40, 0.12);
      border-radius: 30px;
      background:
        linear-gradient(120deg, rgba(255, 253, 242, 0.82), rgba(253, 245, 208, 0.52)),
        linear-gradient(90deg, rgba(245, 200, 66, 0.16), transparent 42%);
      box-shadow: var(--shadow-soft);
    }

    .hero-title {
      margin: 0;
      max-width: none;
      font-family: var(--font-title);
      font-size: clamp(30px, 3.6vw, 48px);
      line-height: 1.12;
      font-weight: 650;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .hero-line {
      display: inline;
    }

    .hero-note {
      position: relative;
      min-height: 126px;
      padding: 17px 18px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255, 253, 242, 0.95), rgba(253, 245, 208, 0.78)),
        repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(92, 74, 40, 0.055) 28px);
      box-shadow: 0 18px 48px rgba(92, 74, 40, 0.08);
      overflow: hidden;
    }

    .hero-note::after {
      content: "";
      position: absolute;
      width: 94px;
      height: 94px;
      right: -30px;
      top: -28px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 200, 66, 0.64), rgba(245, 200, 66, 0.08) 62%, transparent 64%);
    }

    .note-label {
      color: var(--warm-wheat);
      font-size: 12px;
    }

    .note-number {
      display: block;
      margin-top: 10px;
      font-size: 40px;
      line-height: 0.9;
      font-weight: 500;
    }

    .note-copy {
      max-width: 270px;
      margin: 9px 0 0;
      color: var(--umber);
      font-size: 13px;
      line-height: 1.62;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      margin: 14px 0 22px;
      background: rgba(92, 74, 40, 0.12);
      border: 1px solid rgba(92, 74, 40, 0.12);
      border-radius: 26px;
      overflow: hidden;
    }

    .metric {
      min-height: 82px;
      padding: 16px 18px;
      background: rgba(255, 253, 242, 0.78);
    }

    .metric span {
      display: block;
      color: var(--umber);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 9px;
      font-size: 30px;
      line-height: 1;
      font-weight: 480;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(270px, 0.82fr) minmax(430px, 1.34fr) minmax(300px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(92, 74, 40, 0.10);
      border-radius: 26px;
      background: rgba(255, 253, 242, 0.76);
      box-shadow: 0 18px 52px rgba(92, 74, 40, 0.07);
      overflow: hidden;
    }

    .panel.open {
      background: transparent;
      box-shadow: none;
      border-radius: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px 10px;
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      font-weight: 560;
    }

    .filters {
      display: grid;
      gap: 10px;
      padding: 0 18px 12px;
    }

    .search,
    .select,
    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--soft-line);
      border-radius: var(--radius-sm);
      background: rgba(255, 253, 242, 0.78);
      outline: 0;
      padding: 10px 12px;
    }

    .textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.65;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .client-list {
      display: grid;
      gap: 2px;
      max-height: min(720px, calc(100vh - 330px));
      overflow: auto;
      padding: 0 10px 12px;
    }

    .client-item {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 13px 12px;
      background: transparent;
      text-align: left;
      display: grid;
      grid-template-columns: 46px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .client-item:hover,
    .client-item.active {
      background: rgba(250, 224, 122, 0.28);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--pale-cream);
      color: var(--warm-wheat);
      font-weight: 620;
      box-shadow: inset 0 0 0 1px rgba(92, 74, 40, 0.08);
    }

    .client-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .client-meta {
      margin-top: 5px;
      color: rgba(44, 39, 32, 0.63);
      font-size: 11px;
      line-height: 1.5;
    }

    .score {
      min-width: 42px;
      text-align: right;
      color: var(--warm-wheat);
    }

    .score strong {
      display: block;
      font-size: 20px;
      line-height: 1;
      font-weight: 520;
    }

    .score small {
      color: rgba(44, 39, 32, 0.5);
      font-size: 10px;
    }

    .detail {
      padding: 22px;
      background: rgba(255, 253, 242, 0.70);
      border: 1px solid rgba(92, 74, 40, 0.10);
      border-radius: 26px;
      box-shadow: 0 18px 52px rgba(92, 74, 40, 0.07);
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--soft-line);
    }

    .identity {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .avatar.big {
      width: 68px;
      height: 68px;
      font-size: 26px;
      background: linear-gradient(135deg, var(--pale-cream), rgba(245, 200, 66, 0.38));
    }

    .identity h2 {
      margin: 0;
      font-size: clamp(26px, 2.8vw, 40px);
      line-height: 1.05;
      font-weight: 560;
    }

    .identity p {
      margin: 10px 0 0;
      color: var(--umber);
      line-height: 1.62;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(245, 200, 66, 0.20);
      color: var(--umber);
      font-size: 11px;
      white-space: nowrap;
    }

    .badge.line {
      background: transparent;
      border: 1px solid var(--soft-line);
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .story-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 16px;
      margin-top: 16px;
    }

    .section {
      padding: 15px 0;
      border-bottom: 1px solid var(--soft-line);
    }

    .section:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--warm-wheat);
      font-weight: 620;
    }

    .section p {
      margin: 0;
      color: rgba(44, 39, 32, 0.78);
      line-height: 1.72;
    }

    .course-meter {
      margin-top: 18px;
    }

    .meter-line {
      height: 12px;
      border-radius: 999px;
      background: rgba(232, 220, 200, 0.72);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--sun-yellow), var(--warm-wheat));
      transition: width 220ms ease;
    }

    .timeline {
      padding: 0 18px 18px;
      max-height: min(760px, calc(100vh - 330px));
      overflow: auto;
    }

    .timeline-item {
      position: relative;
      padding: 0 0 20px 20px;
      border-left: 1px solid var(--paper-beige);
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -6px;
      top: 0;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--sun-yellow);
      box-shadow: 0 0 0 5px rgba(245, 200, 66, 0.18);
    }

    .timeline-date {
      color: rgba(44, 39, 32, 0.5);
      font-size: 11px;
    }

    .timeline-title {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-top: 7px;
      font-weight: 610;
    }

    .timeline-copy {
      margin-top: 8px;
      color: rgba(44, 39, 32, 0.72);
      font-size: 12px;
      line-height: 1.75;
    }

    .funnel {
      margin-top: 18px;
      padding: 22px;
      border: 1px solid rgba(92, 74, 40, 0.10);
      border-radius: 26px;
      background: rgba(255, 253, 242, 0.72);
      box-shadow: 0 18px 52px rgba(92, 74, 40, 0.07);
    }

    .funnel h2 {
      margin: 0;
      font-size: clamp(24px, 2.8vw, 36px);
      line-height: 1;
      font-weight: 440;
    }

    .funnel p {
      margin: 10px 0 28px;
      color: var(--umber);
    }

    .funnel-bars {
      display: grid;
      gap: 14px;
    }

    .funnel-row {
      display: grid;
      grid-template-columns: 120px 1fr 70px;
      gap: 14px;
      align-items: center;
    }

    .bar-track {
      height: 42px;
      border-radius: 999px;
      background: rgba(232, 220, 200, 0.44);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      min-width: 36px;
      border-radius: inherit;
      background: var(--sun-yellow);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
      color: var(--deep-ink);
      font-size: 13px;
      transition: width 220ms ease;
    }

    .roster-panel {
      margin-top: 18px;
      padding-bottom: 18px;
    }

    .roster-tools {
      display: grid;
      grid-template-columns: minmax(220px, 0.8fr) minmax(320px, 1.2fr) auto auto auto;
      gap: 10px;
      align-items: start;
      padding: 0 18px 14px;
    }

    .roster-textarea {
      min-height: 72px;
      resize: vertical;
    }

    .roster-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 18px 12px;
      color: var(--umber);
      font-size: 12px;
    }

    .roster-table-wrap {
      margin: 0 18px;
      border: 1px solid rgba(92, 74, 40, 0.12);
      border-radius: 18px;
      overflow: auto;
      background: rgba(255, 253, 242, 0.58);
    }

    .roster-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      font-size: 12px;
    }

    .roster-table th,
    .roster-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(92, 74, 40, 0.10);
      text-align: left;
      vertical-align: top;
    }

    .roster-table th {
      color: var(--warm-wheat);
      font-weight: 620;
      background: rgba(253, 245, 208, 0.45);
      white-space: nowrap;
    }

    .roster-table tr:last-child td {
      border-bottom: 0;
    }

    .roster-match-select {
      min-width: 150px;
      border: 1px solid var(--soft-line);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 253, 242, 0.82);
      outline: 0;
    }

    .roster-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .form-field label {
      display: block;
      margin-bottom: 7px;
      color: var(--umber);
      font-size: 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(44, 39, 32, 0.28);
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(780px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      border-radius: 30px;
      background: var(--white-paper);
      box-shadow: 0 40px 120px rgba(44, 39, 32, 0.24);
      padding: 28px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 32px;
      font-weight: 470;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .empty {
      padding: 44px 22px;
      color: var(--umber);
      line-height: 1.8;
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 40;
      display: none;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--deep-ink);
      color: var(--cream);
      box-shadow: var(--shadow-soft);
    }

    .toast.show {
      display: block;
    }

    @media (min-width: 1181px) {
      .app-shell {
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr);
        grid-template-areas:
          "side hero"
          "side metrics"
          "workspace workspace"
          "roster roster";
        gap: 14px 18px;
        width: min(1320px, calc(100% - 48px));
        padding-top: 18px;
      }

      .topbar {
        grid-area: side;
        align-self: start;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: 22px;
        min-height: 318px;
        padding: 24px;
        border: 1px solid rgba(92, 74, 40, 0.12);
        border-radius: 30px;
        background:
          linear-gradient(150deg, rgba(255, 253, 242, 0.88), rgba(253, 245, 208, 0.48)),
          repeating-linear-gradient(0deg, transparent, transparent 26px, rgba(92, 74, 40, 0.045) 27px);
        box-shadow: 0 18px 52px rgba(92, 74, 40, 0.07);
      }

      .brand h1 {
        font-size: 50px;
        white-space: nowrap;
      }

      .brand p {
        max-width: 230px;
        font-size: 13px;
        line-height: 1.72;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr;
        justify-content: stretch;
        align-items: stretch;
        max-width: none;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .field-inline {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        width: 100%;
        padding: 11px 13px;
        border-radius: 18px;
        background: rgba(255, 253, 242, 0.70);
      }

      .field-inline select {
        width: 100%;
        min-width: 0;
      }

      .toolbar .btn {
        width: 100%;
        border-radius: 18px;
        padding: 11px 13px;
        text-align: left;
      }

      .hero {
        grid-area: hero;
        min-height: 166px;
      }

      .hero-title {
        font-size: clamp(34px, 3.25vw, 46px);
      }

      .metrics {
        grid-area: metrics;
        margin: 0;
      }

      .workspace {
        grid-area: workspace;
        grid-template-columns: 330px minmax(0, 1fr) 360px;
      }

      .roster-panel {
        grid-area: roster;
      }

      .client-list,
      .timeline {
        max-height: min(650px, calc(100vh - 390px));
      }
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 340px 1fr;
      }

      .workspace > aside:last-child {
        grid-column: 1 / -1;
      }

      .timeline {
        max-height: none;
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        width: min(100% - 28px, 720px);
        padding-top: 18px;
      }

      .topbar,
      .hero,
      .workspace,
      .story-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
        gap: 18px;
      }

      .toolbar {
        justify-content: flex-start;
        width: 100%;
        max-width: none;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero {
        padding: 22px;
      }

      .hero-title {
        white-space: normal;
      }

      .workspace {
        display: grid;
      }

      .detail-top {
        display: grid;
      }

      .detail-actions {
        justify-content: flex-start;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .funnel-row {
        grid-template-columns: 82px 1fr 48px;
      }

      .roster-tools {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      body {
        overflow-x: hidden;
      }

      .app-shell {
        width: calc(100vw - 28px);
        max-width: none;
        overflow: hidden;

      .toolbar {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
        max-width: none;

      .field-inline {
        display: grid;

        gap: 6px;
        grid-column: 1 / -1;
        justify-content: stretch;
        width: 100%;
      }

        min-width: 0;

        max-width: none;
        text-align: left;
      }

      .toolbar .btn {
        min-width: 0;
        width: 100%;

      }

        max-width: 100%;

      }

      .client-item {
        grid-template-columns: 40px 1fr;
      }

      .score {
        grid-column: 2;
        text-align: left;
      }
    }
  </style>
</head>
<body>

        {

          attended: false
        }
      ],
      followUps: [
        {

          clientId: "c1",
          date: "2026-05-10",
          emotion: "焦虑",
          content: "聊到近期睡眠问题，她意识到压力来自长期自我要求。",
          nextAction: "三天后提醒她记录睡前身体感受。",
          remindDate: "2026-05-13",
          done: false
        },
        {
          id: "f2",
          clientId: "c2",
          date: "2026-05-08",
          emotion: "好奇",
          content: "沙龙后简单沟通，他对身体症状背后的情绪原因感兴趣。",
          nextAction: "发送课程介绍，邀请做一次初步咨询。",
          remindDate: "2026-05-11",
          done: false
        },
        {
          id: "f3",
          clientId: "c3",
          date: "2026-05-07",
          emotion: "感恩",
          content: "反馈咨询后睡眠有改善，但亲密关系议题仍有波动。",
          nextAction: "下次咨询前请她记录一次触发点。",
          remindDate: "2026-05-14",
          done: false
        }
      ]
    };

    let state = loadState();
    const els = {};

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      cacheElements();
      bindEvents();
      ensureValidSelection();
      render();
    }

    function cacheElements() {
      [
        "currentUserSelect", "addUserBtn", "exportBtn", "shareViewBtn", "shareBaseBtn", "importBtn", "resetBtn", "importFile",
        "todayReminderHero", "metricClients", "metricPriority", "metricActivities", "metricAvgScore",
        "newClientBtn", "searchInput", "stageFilter", "categoryFilter", "clientList", "clientDetail",
        "funnelBars", "newFollowBtn", "newActivityBtn", "timeline", "modalBackdrop", "modalTitle",
        "closeModalBtn", "modalBody", "toast", "rosterActivitySelect", "rosterNameInput",
        "importRosterBtn", "exportRosterBtn", "clearRosterInputBtn", "newRosterActivityBtn",
        "rosterSummary", "rosterTableBody"
      ].forEach((id) => els[id] = document.getElementById(id));
    }

    function bindEvents() {
      els.currentUserSelect.addEventListener("change", (event) => {
        state.currentUserId = event.target.value;
        state.selectedClientId = null;
        ensureValidSelection();
        saveAndRender();
      });
      els.addUserBtn.addEventListener("click", openUserModal);
      els.exportBtn.addEventListener("click", exportBackup);
      els.shareViewBtn.addEventListener("click", createShareView);
      els.shareBaseBtn.addEventListener("click", openShareBaseModal);
      els.importBtn.addEventListener("click", () => els.importFile.click());
      els.importFile.addEventListener("change", importBackup);
      els.resetBtn.addEventListener("click", resetSeed);
      els.newClientBtn.addEventListener("click", () => openClientModal());
      els.newFollowBtn.addEventListener("click", () => openFollowModal());
      els.newActivityBtn.addEventListener("click", () => openActivityModal());
      els.newRosterActivityBtn.addEventListener("click", () => openActivityModal());
      els.rosterActivitySelect.addEventListener("change", (event) => {
        state.selectedActivityId = event.target.value;
        saveAndRender();
      });
      els.importRosterBtn.addEventListener("click", importRosterNames);
      els.exportRosterBtn.addEventListener("click", exportRoster);
      els.clearRosterInputBtn.addEventListener("click", () => {
        els.rosterNameInput.value = "";
      });
      els.searchInput.addEventListener("input", render);
      els.stageFilter.addEventListener("change", render);
      els.categoryFilter.addEventListener("change", render);
      els.closeModalBtn.addEventListener("click", closeModal);
      els.modalBackdrop.addEventListener("click", (event) => {
        if (event.target === els.modalBackdrop) closeModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return normalizeState(structuredClone(seedState));
        const parsed = JSON.parse(raw);
        return normalizeState({ ...structuredClone(seedState), ...parsed });
      } catch {
        return normalizeState(structuredClone(seedState));
      }
    }

    function normalizeState(nextState) {
      nextState.users ||= structuredClone(seedState.users);
      nextState.clients ||= [];
      nextState.activities ||= [];
      nextState.followUps ||= [];
      nextState.currentUserId ||= nextState.users[0]?.id;
      nextState.activities = nextState.activities.map((activity) => ensureActivityRoster(activity, nextState.clients));
      nextState.selectedActivityId ||= nextState.activities[0]?.id || "";
      return nextState;
    }

    function ensureActivityRoster(activity, allClients = state.clients) {
      const existing = Array.isArray(activity.roster) ? activity.roster : [];
      const roster = existing.map((row) => ({
        id: row.id || uid("r"),
        rawName: row.rawName || allClients.find((client) => client.id === row.clientId)?.name || "",
        clientId: row.clientId || "",
        checkedIn: Boolean(row.checkedIn)
      }));
      (activity.participantClientIds || []).forEach((clientId) => {
        if (!roster.some((row) => row.clientId === clientId)) {
          const client = allClients.find((item) => item.id === clientId);
          roster.push({
            id: uid("r"),
            rawName: client?.name || "",
            clientId,
            checkedIn: Boolean(activity.attended)
          });
        }
      });
      return { ...activity, roster };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function saveAndRender() {
      saveState();
      render();
    }

    function currentUser() {
      return state.users.find((user) => user.id === state.currentUserId) || state.users[0];
    }

    function visibleClients() {
      const user = currentUser();
      const query = (els.searchInput?.value || "").trim().toLowerCase();
      const stage = els.stageFilter?.value || "all";
      const category = els.categoryFilter?.value || "all";
      return state.clients
        .filter((client) => client.ownerName === user.name || client.referrerName === user.name)
        .filter((client) => stage === "all" || client.stage === stage)
        .filter((client) => category === "all" || client.category === category)
        .filter((client) => {
          if (!query) return true;
          return [
            client.name, client.phone, client.wechat, client.occupation, client.referrerName,
            client.category, client.stage, client.enrolledCourses, client.attendedCourses,
            client.needs, client.situation, ...(client.tags || [])
          ].join(" ").toLowerCase().includes(query);
        })
        .sort((a, b) => priorityScore(b) - priorityScore(a) || activityScore(b) - activityScore(a));
    }

    function ensureValidSelection() {
      const clients = visibleClients();
      if (!clients.some((client) => client.id === state.selectedClientId)) {
        state.selectedClientId = clients[0]?.id || null;
      }
    }

    function selectedClient() {
      return state.clients.find((client) => client.id === state.selectedClientId) || null;
    }

    function render() {
      ensureValidSelection();
      renderUsers();
      renderMetrics();
      renderClientList();
      renderDetail();
      renderTimeline();
      renderFunnel();
      renderRoster();
    }

    function renderUsers() {
      els.currentUserSelect.innerHTML = state.users
        .map((user) => `<option value="${escapeHtml(user.id)}"${user.id === state.currentUserId ? " selected" : ""}>${escapeHtml(user.name)}</option>`)
        .join("");
    }

    function renderMetrics() {
      const clients = visibleClients();
      const reminders = state.followUps.filter((follow) => {
        const client = state.clients.find((item) => item.id === follow.clientId);
        return client && clients.includes(client) && !follow.done && follow.remindDate && follow.remindDate <= today();
      });
      const priority = clients.filter((client) => isPriorityClient(client));
      const month = today().slice(0, 7);
      const activityCount = state.activities.filter((activity) => {
        if (!activity.date.startsWith(month)) return false;
        return activity.participantClientIds.some((id) => clients.some((client) => client.id === id));
      }).reduce((sum, activity) => {
        return sum + activity.participantClientIds.filter((id) => clients.some((client) => client.id === id)).length;
      }, 0);
      const avg = clients.length ? Math.round(clients.reduce((sum, client) => sum + activityScore(client), 0) / clients.length) : 0;

      els.todayReminderHero.textContent = reminders.length;
      els.metricClients.textContent = clients.length;
      els.metricPriority.textContent = priority.length;
      els.metricActivities.textContent = activityCount;
      els.metricAvgScore.textContent = avg;
    }

    function renderClientList() {
      const clients = visibleClients();
      if (!clients.length) {
        els.clientList.innerHTML = `<div class="empty">这里暂时安静。换一个筛选条件，或新建一位需要被陪伴的人。</div>`;
        return;
      }
      els.clientList.innerHTML = clients.map((client) => {
        const score = activityScore(client);
        return `
          <button class="client-item ${client.id === state.selectedClientId ? "active" : ""}" type="button" data-client-id="${escapeHtml(client.id)}">
            <span class="avatar">${lastChar(client.name)}</span>
            <span>
              <span class="client-name">
                ${escapeHtml(client.name)}
                ${isPriorityClient(client) ? `<span class="badge">重点</span>` : ""}
              </span>
              <span class="client-meta">${escapeHtml(client.stage)} · ${escapeHtml(client.category)}<br>${escapeHtml(client.occupation || "未填写职业")}</span>
            </span>
            <span class="score"><strong>${score}</strong><small>活跃</small></span>
          </button>
        `;
      }).join("");
      els.clientList.querySelectorAll("[data-client-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedClientId = button.dataset.clientId;
          saveAndRender();
        });
      });
    }

    function renderDetail() {
      const client = selectedClient();
      if (!client) {
        els.clientDetail.innerHTML = `<div class="empty">还没有客户档案。先为一段新的陪伴关系留出位置。</div>`;
        return;
      }
      const score = activityScore(client);
      els.clientDetail.innerHTML = `
        <div class="detail-top">
          <div class="identity">
            <span class="avatar big">${lastChar(client.name)}</span>
            <div>
              <h2>${escapeHtml(client.name)}</h2>

          kind: "陪伴",

        .filter((activity) => activity.participantClientIds.includes(client.id))

    function renderFunnel() {
      const clients = visibleClients();

        ["体验", "体验"],
        ["成交", "确认"],
        ["复购", "长期陪伴"]

      const max = Math.max(1, ...stages.map(([stage]) => clients.filter((client) => client.stage === stage).length));
      els.funnelBars.innerHTML = stages.map(([stage, label], index) => {
        const count = clients.filter((client) => client.stage === stage).length;
        const width = Math.max(12, Math.round((count / max) * 100));
        const colors = ["#FAE07A", "#F5C842", "#E8B420", "#C8924A"];
        return `
          <div class="funnel-row">
            <strong>${label}</strong>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%;background:${colors[index]};">${stage}</div></div>
            <span>${count} 位</span>
          </div>

      }).join("");

    function clientSelectHtml(selectedId) {
      const options = [
        `<option value="">未匹配</option>`,
        ...state.clients.map((client) => `
          <option value="${escapeAttr(client.id)}"${client.id === selectedId ? " selected" : ""}>

    function updateRosterRow(rowId, patch) {
      const activity = selectedActivity();
      if (!activity) return;
      activity.roster = (activity.roster || []).map((row) => row.id === rowId ? { ...row, ...patch } : row);
      syncActivityParticipants(activity);
      saveAndRender();
    }

    function importRosterNames() {
      const activity = selectedActivity();
      if (!activity) return toast("请先新建或选择一个活动。");
      const names = els.rosterNameInput.value
        .split(/[\n,，、;；]+/)
        .map((name) => name.trim())
        .filter(Boolean);
      if (!names.length) return toast("请先录入报名姓名。");
      activity.roster ||= [];
      let added = 0;
      names.forEach((rawName) => {
        if (activity.roster.some((row) => row.rawName === rawName)) return;
        const client = findClientByName(rawName);
        activity.roster.push({
          id: uid("r"),
          rawName,
          clientId: client?.id || "",
          checkedIn: false
        });
        added += 1;
      });
      syncActivityParticipants(activity);
      els.rosterNameInput.value = "";
      toast(`已录入 ${added} 位报名人。`);
      saveAndRender();
    }

    function findClientByName(rawName) {
      const compact = rawName.replace(/\s/g, "");
      return state.clients.find((client) => client.name === rawName)
        || state.clients.find((client) => client.name.replace(/\s/g, "") === compact)
        || state.clients.find((client) => client.name.includes(rawName) || rawName.includes(client.name));
    }

    function syncActivityParticipants(activity) {
      activity.participantClientIds = [...new Set((activity.roster || []).map((row) => row.clientId).filter(Boolean))];
      activity.attended = (activity.roster || []).length > 0 && activity.roster.every((row) => row.checkedIn);
    }

    function exportRoster() {
      const activity = selectedActivity();
      if (!activity) return toast("请先选择一个活动。");
      const roster = activity.roster || [];
      if (!roster.length) return toast("当前活动还没有报名名单。");
      const rows = roster.map((row, index) => {
        const client = state.clients.find((item) => item.id === row.clientId);
        return {
          "序号": index + 1,
          "报名姓名": row.rawName,
          "匹配客户": client?.name || "",
          "推荐人": client?.referrerName || client?.ownerName || "",

          "当前阶段": client?.stage || "",
          "电话": client?.phone || "",
          "微信": client?.wechat || "",
          "职业": client?.occupation || "",
          "已报课程": client?.enrolledCourses || "",
          "已上课程": client?.attendedCourses || "",
          "课程认可度": client?.courseRecognition ?? "",
          "客户需求": client?.needs || "",
          "客户状况": client?.situation || "",
          "签到": row.checkedIn ? "已到" : "未到"
        };
      });
      downloadCsv(`${activity.title}_报名签到名单_${activity.date || today()}.csv`, rows);
      toast("名单已下载。");
    }

    function downloadCsv(filename, rows) {
      const headers = Object.keys(rows[0]);
      const csv = [
        headers.join(","),
        ...rows.map((row) => headers.map((header) => csvCell(row[header])).join(","))
      ].join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function activityScore(client) {
      let score = 0;
      if ((client.enrolledCourses || "").trim()) score += 25;
      if ((client.attendedCourses || "").trim()) score += 20;
      score += Math.min(25, Math.round(Number(client.courseRecognition || 0) * 0.25));
      const recentActivity = state.activities.some((activity) => {
        return activity.participantClientIds.includes(client.id) && daysBetween(activity.date, today()) <= 30;
      });
      if (recentActivity) score += 15;
      const recentFollow = state.followUps.some((follow) => {
        return follow.clientId === client.id && daysBetween(follow.date, today()) <= 14;
      });
      if (recentFollow) score += 15;
      return Math.max(0, Math.min(100, score));
    }

    function priorityScore(client) {
      return isPriorityClient(client) ? 1 : 0;
    }

    function isPriorityClient(client) {
      const overdue = state.followUps.some((follow) => follow.clientId === client.id && !follow.done && follow.remindDate && follow.remindDate <= today());
      const sensitive = /压力|焦虑|睡眠|疲惫/.test(`${client.situation || ""}${client.needs || ""}${(client.tags || []).join("")}`);
      return overdue || ["成交", "复购"].includes(client.stage) || activityScore(client) < 45 || sensitive;
    }

    function priorityReason(client) {
      if (state.followUps.some((follow) => follow.clientId === client.id && !follow.done && follow.remindDate && follow.remindDate <= today())) return "有一条提醒正在等待回应。";
      if (["成交", "复购"].includes(client.stage)) return "关系已经进入较深阶段，适合保持稳定陪伴。";
      if (activityScore(client) < 45) return "近期活跃度偏低，适合轻轻问候。";
      return "状态稳定，可以按节奏陪伴。";
    }

    function daysBetween(dateA, dateB) {
      const a = new Date(dateA + "T00:00:00");
      const b = new Date(dateB + "T00:00:00");
      return Math.abs(Math.round((b - a) / 86400000));
    }

          event.preventDefault();
          onSubmit(new FormData(form));
        });
      }
      const firstInput = els.modalBody.querySelector("input,select,textarea");
      if (firstInput) firstInput.focus();
    }

    function inputField(label, name, value, required = false, type = "text", full = false) {
      return `
        <div class="form-field ${full ? "full" : ""}">
          <label>${label}</label>
          <input class="input" name="${name}" type="${type}" value="${escapeAttr(value)}" ${required ? "required" : ""} />
        </div>
      `;
    }

    function textareaField(label, name, value) {
      return `
        <div class="form-field full">
          <label>${label}</label>
          <textarea class="textarea" name="${name}">${escapeHtml(value)}</textarea>
        </div>
      `;
    }

    function selectField(label, name, value, options) {
      const opts = options.map((option) => {
        const val = Array.isArray(option) ? option[0] : option;
        const text = Array.isArray(option) ? option[1] : option;
        return `<option value="${escapeAttr(val)}"${val === value ? " selected" : ""}>${escapeHtml(text)}</option>`;
      }).join("");
      return `
        <div class="form-field">
          <label>${label}</label>
          <select class="select" name="${name}">${opts}</select>
        </div>
      `;
    }

    function deleteClient(clientId) {
      const client = state.clients.find((item) => item.id === clientId);
      if (!client) return;
      if (!confirm(`确认删除「${client.name}」的档案和相关陪伴记录吗？`)) return;
      state.clients = state.clients.filter((item) => item.id !== clientId);
      state.followUps = state.followUps.filter((item) => item.clientId !== clientId);
      state.activities = state.activities.map((activity) => ({
        ...activity,
        participantClientIds: activity.participantClientIds.filter((id) => id !== clientId)
      })).filter((activity) => activity.participantClientIds.length);
      state.selectedClientId = null;
      toast("客户档案已删除。");
      saveAndRender();
    }

    function exportBackup() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `境心客户陪伴系统备份_${today()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast("备份文件已导出。");
    }

    function createShareView() {
      const shareState = {
        exportedAt: new Date().toISOString(),
        users: state.users,
        clients: state.clients,
        activities: state.activities,
        followUps: state.followUps
      };
      const encoded = encodeShareData(shareState);
      const base = new URL("share.html", window.location.href);
      base.hash = `data=${encoded}`;
      const publicBase = getSharePublicBaseUrl();
      const publicLink = publicBase ? `${publicBase}#data=${encoded}` : "";
      copyText(base.href);
      openModal("共享查看链接", `
        <div class="form-field full">
          <label>电脑本地预览链接</label>
          <textarea class="textarea" readonly style="min-height:130px;">${escapeHtml(base.href)}</textarea>
        </div>
        <div class="form-field full" style="margin-top:14px;">
          <label>推荐人手机可打开链接</label>
          <textarea class="textarea" readonly style="min-height:130px;">${escapeHtml(publicLink || "还没有设置线上 share.html 地址。请先点击「线上地址」，填入公网 share.html 链接。")}</textarea>
        </div>
        <p style="margin:14px 0 0;color:var(--umber);line-height:1.7;">手机无法打开 <strong>file://</strong> 本地路径。需要先把 <strong>mobile-share-site/share.html</strong> 上传到静态网页空间，再在「线上地址」里填写公网地址。</p>
        <div class="modal-actions">
          <button class="btn ghost" type="button" onclick="navigator.clipboard?.writeText(document.querySelectorAll('#modalBody textarea')[1].value)">复制手机链接</button>
          <button class="btn ghost" type="button" id="setShareBaseFromModalBtn">设置线上地址</button>
          <a class="btn primary" href="${escapeAttr(base.href)}" target="_blank" rel="noopener" style="text-decoration:none;">打开共享页</a>
        </div>
      `, () => {});
      const setButton = document.getElementById("setShareBaseFromModalBtn");
      if (setButton) setButton.addEventListener("click", openShareBaseModal);
      toast("共享查看链接已生成。");
    }

    function openShareBaseModal() {
      const current = getSharePublicBaseUrl();
      openModal("设置线上共享地址", `
        <form>
          <div class="form-field full">
            <label>公网 share.html 地址</label>
            <input class="input" name="shareBase" value="${escapeAttr(current)}" placeholder="例如：https://your-site.netlify.app/share.html" />
          </div>
          <p style="margin:12px 0 0;color:var(--umber);line-height:1.7;">把 <strong>mobile-share-site</strong> 文件夹上传到 Netlify、Vercel、GitHub Pages、Cloudflare Pages 等静态网站后，将其中的 <strong>share.html</strong> 公网地址填在这里。之后生成的共享链接就能在推荐人手机上直接打开。</p>
          <div class="modal-actions">
            <button class="btn ghost" type="button" onclick="localStorage.removeItem('jingxin-share-base-url');document.getElementById('closeModalBtn').click()">清除</button>
            <button class="btn primary" type="submit">保存地址</button>
          </div>
        </form>
      `, (data) => {
        const value = data.get("shareBase").trim();
        if (value && !/^https?:\/\//.test(value)) return toast("请填写 http 或 https 开头的网址。");
        localStorage.setItem("jingxin-share-base-url", value);
        closeModal();
        toast("线上共享地址已保存。");
      });
    }

    function getSharePublicBaseUrl() {
      const value = (localStorage.getItem("jingxin-share-base-url") || "").trim();
      if (!value) return "";
      try {
        const url = new URL(value, window.location.href);
        url.hash = "";
        return url.href;
      } catch {
        return "";
      }
    }

    function encodeShareData(data) {
      const json = JSON.stringify(data);
      const bytes = new TextEncoder().encode(json);
      let binary = "";
      bytes.forEach((byte) => binary += String.fromCharCode(byte));
      return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    }

    function copyText(text) {
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).catch(() => {});
      }
    }

    function importBackup(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!Array.isArray(parsed.clients) || !Array.isArray(parsed.users)) {
            throw new Error("Invalid backup");
          }
          state = { ...structuredClone(seedState), ...parsed };
          ensureValidSelection();
          saveAndRender();
          toast("备份已导入。");
        } catch {
          toast("导入失败，请确认是有效的 JSON 备份。");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    function resetSeed() {
      if (!confirm("确认恢复示例数据？当前本地数据会被覆盖。")) return;
      state = structuredClone(seedState);
      saveAndRender();
      toast("已恢复示例数据。");
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    function lastChar(value) {
      const chars = Array.from(value || "屋");
      return escapeHtml(chars[chars.length - 1] || "屋");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ");
    }
  </script>
</body>
</html>
